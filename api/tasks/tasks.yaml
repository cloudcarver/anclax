tasks:
  - name: deleteOpaqueKey
    description: Delete an opaque key
    parameters:
      type: object
      required: [keyID]
      properties:
        keyID:
          type: integer
          format: int64
          description: The ID of the opaque key to delete
    retryPolicy:
      interval: 30m
      maxAttempts: -1
    events:
      - onFailed

  - name: updateWorkerRuntimeConfig
    description: Update worker runtime config and wait for alive workers to apply it
    priority: "INF"
    parameters:
      type: object
      properties:
        requestID:
          type: string
          description: Correlation ID for notify and ack messages
        maxStrictPercentage:
          type: integer
          format: int32
          description: Maximum percentage of strict-priority slots (0-100)
        defaultWeight:
          type: integer
          format: int32
          description: Default weight for unlabeled task group
        labels:
          type: array
          items:
            type: string
          description: Label names for weighted groups
        weights:
          type: array
          items:
            type: integer
            format: int32
          description: Weights for labels by index
        notifyInterval:
          type: string
          description: Fallback retry interval when ack listening is unavailable
        listenTimeout:
          type: string
          description: Ack listen timeout window for one iteration
    retryPolicy:
      interval: 2s
      maxAttempts: -1
    timeout: 5m

  - name: interruptTask
    description: Interrupt a task and stop any in-flight execution
    priority: "INF"
    parameters:
      type: object
      required: [taskIDs]
      properties:
        taskIDs:
          type: array
          items:
            type: integer
            format: int32
          description: Task IDs to interrupt
        requestID:
          type: string
          description: Correlation ID for notify and ack messages
        notifyInterval:
          type: string
          description: Fallback retry interval when ack listening is unavailable
        listenTimeout:
          type: string
          description: Ack listen timeout window for one iteration
    retryPolicy:
      interval: 2s
      maxAttempts: -1
    timeout: 5m

  - name: broadcastUpdateWorkerRuntimeConfig
    description: Broadcast a runtime config update command to all alive workers
    priority: "INF"
    parameters:
      type: object
      properties:
        requestID:
          type: string
          description: Correlation ID for this broadcast command
        maxStrictPercentage:
          type: integer
          format: int32
          description: Maximum percentage of strict-priority slots (0-100)
        defaultWeight:
          type: integer
          format: int32
          description: Default weight for unlabeled task group
        labels:
          type: array
          items:
            type: string
          description: Label names for weighted groups
        weights:
          type: array
          items:
            type: integer
            format: int32
          description: Weights for labels by index
        ackPollInterval:
          type: string
          description: Poll interval used while waiting for worker convergence
        workerIDs:
          type: array
          items:
            type: string
            format: uuid
          description: Fixed snapshot of worker IDs targeted by this broadcast request
    retryPolicy:
      interval: 2s
      maxAttempts: -1
    timeout: 5m

  - name: applyWorkerRuntimeConfigToWorker
    description: Apply a runtime config version on one specific worker
    priority: "INF"
    parameters:
      type: object
      required: [workerID, version]
      properties:
        requestID:
          type: string
          description: Correlation ID of the parent broadcast command
        workerID:
          type: string
          format: uuid
          description: Target worker ID
        version:
          type: integer
          format: int64
          description: Runtime config version to apply
    retryPolicy:
      interval: 1s
      maxAttempts: -1
    timeout: 5m

  - name: broadcastCancelTask
    description: Broadcast cancel-task command to alive workers
    priority: "INF"
    parameters:
      type: object
      required: [taskIDs]
      properties:
        requestID:
          type: string
          description: Correlation ID for this broadcast command
        taskIDs:
          type: array
          items:
            type: integer
            format: int32
          description: Task IDs to interrupt on each target worker
        ackPollInterval:
          type: string
          description: Poll interval used while waiting worker ack tasks
        workerIDs:
          type: array
          items:
            type: string
            format: uuid
          description: Fixed snapshot of worker IDs targeted by this broadcast request
    retryPolicy:
      interval: 2s
      maxAttempts: -1
    timeout: 5m

  - name: cancelTaskOnWorker
    description: Cancel in-flight task execution on one specific worker
    priority: "INF"
    parameters:
      type: object
      required: [workerID, taskIDs]
      properties:
        requestID:
          type: string
          description: Correlation ID of the parent broadcast command
        workerID:
          type: string
          format: uuid
          description: Target worker ID
        taskIDs:
          type: array
          items:
            type: integer
            format: int32
          description: Task IDs to interrupt on the target worker
    retryPolicy:
      interval: 1s
      maxAttempts: -1
    timeout: 5m

  - name: broadcastPauseTask
    description: Broadcast pause-task command to alive workers
    priority: "INF"
    parameters:
      type: object
      required: [taskIDs]
      properties:
        requestID:
          type: string
          description: Correlation ID for this broadcast command
        taskIDs:
          type: array
          items:
            type: integer
            format: int32
          description: Task IDs to interrupt on each target worker
        ackPollInterval:
          type: string
          description: Poll interval used while waiting worker ack tasks
        workerIDs:
          type: array
          items:
            type: string
            format: uuid
          description: Fixed snapshot of worker IDs targeted by this broadcast request
    retryPolicy:
      interval: 2s
      maxAttempts: -1
    timeout: 5m

  - name: pauseTaskOnWorker
    description: Pause in-flight task execution on one specific worker
    priority: "INF"
    parameters:
      type: object
      required: [workerID, taskIDs]
      properties:
        requestID:
          type: string
          description: Correlation ID of the parent broadcast command
        workerID:
          type: string
          format: uuid
          description: Target worker ID
        taskIDs:
          type: array
          items:
            type: integer
            format: int32
          description: Task IDs to interrupt on the target worker
    retryPolicy:
      interval: 1s
      maxAttempts: -1
    timeout: 5m

  - name: stressProbe
    description: No-op stress probe task for worker E2E benchmarking
    parameters:
      type: object
      required: [jobID, sleepMs, group]
      properties:
        jobID:
          type: integer
          format: int64
          description: Logical task id for stress-run metrics correlation
        sleepMs:
          type: integer
          format: int32
          description: Simulated task execution time in milliseconds
        group:
          type: string
          description: Logical group name for test-side metrics and labels
        failMode:
          type: string
          description: Optional failure mode for chaos tests. Set to "always" to return a retryable error every run.
        signalBaseURL:
          type: string
          description: Optional signal service base URL used by running tasks to emit observable heartbeats
        signalIntervalMs:
          type: integer
          format: int32
          description: Optional interval in milliseconds between signal emissions while the task is running
    retryPolicy:
      interval: 1s
      maxAttempts: 1
    timeout: 30s

  - name: cancelObservableProbe
    description: Long-running observable task used to validate cancellation semantics under chaos
    parameters:
      type: object
      required: [group]
      properties:
        group:
          type: string
          description: Logical group name for test-side metrics and labels
        signalBaseURL:
          type: string
          description: Signal service base URL used by the task to emit observable heartbeats
        signalIntervalMs:
          type: integer
          format: int32
          description: Interval in milliseconds between signal emissions while the task is running
    retryPolicy:
      interval: 1s
      maxAttempts: 1
    timeout: 30m
