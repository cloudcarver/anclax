externals:
  oapi-codegen: v2.5.1
  wire: v0.7.0
  sqlc: v1.30.0
  mockgen: v0.6.0

clean:
  - pkg/zgen/apigen/*_gen.go
  - pkg/zgen/querier/*
  - pkg/zgen/taskgen/*
  - pkg/taskcore/e2e/gen/*
  - pkg/taskcore/e2ev2/gen/*
  - pkg/taskcore/dtmtest/gen/*

oapi-codegen:
  path: api/v1.yaml
  out: pkg/zgen/apigen/spec_gen.go
  package: apigen
  config:
    output-options:
      skip-prune: true

wire:
  path: ./wire

xware:
  path: api/v1.yaml
  out: pkg/zgen/apigen/scopes_extend_gen.go
  package: apigen

task-handler:
  path: api/tasks.yaml
  package: taskgen
  out: pkg/zgen/taskgen/runner_gen.go

# DST generation is built into `anclax gen` (no separate external tool entry needed).
dst:
  - path: pkg/taskcore/e2e/e2e.yaml
    out: pkg/taskcore/e2e/gen/taskstore_gen.go
    package: taskcoree2e
  - path: pkg/taskcore/e2ev2/e2e.yaml
    out: pkg/taskcore/e2ev2/gen/taskstore_gen.go
    package: taskcoree2ev2
  - path: pkg/taskcore/dtmtest/e2e.yaml
    out: pkg/taskcore/dtmtest/gen/taskstore_gen.go
    package: taskcoredtmtest

sqlc:
  path: dev/sqlc.yaml

mockgen:
  files:
    - source: pkg/zcore/model/model.go
      destination: pkg/zcore/model/mock_gen.go
      package: model
    - source: pkg/macaroons/interfaces.go
      destination: pkg/macaroons/mock_gen.go
      package: macaroons
    - source: pkg/macaroons/store/interfaces.go
      destination: pkg/macaroons/store/mock_gen.go
      package: store
    - source: pkg/auth/auth.go
      destination: pkg/auth/mock_gen.go
      package: auth
    - source: pkg/taskcore/store/interfaces.go
      destination: pkg/taskcore/store/mock_gen.go
      package: store
    - source: pkg/taskcore/worker/interfaces.go
      destination: pkg/taskcore/worker/mock_gen.go
      package: worker
    - source: pkg/zgen/taskgen/runner_gen.go
      destination: pkg/zgen/taskgen/runner_gen_mock.go
      package: taskgen
    - source: pkg/hooks/hooks.go
      destination: pkg/hooks/mock_gen.go
      package: hooks
    - source: core/types.go
      destination: core/mock_types.go
      package: core
